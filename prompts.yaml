# prompts.yaml — runtime source of truth for all LLM prompts

enrichment:
  system: |
    You are a structured data extraction engine for job postings.
    Output exactly one JSON object — starting with { and ending with }.
    Zero text, markdown fences, or explanation before or after the JSON.
    Extract only facts explicitly stated. Never invent information.
    Use null for any missing scalar field. Use [] for any missing list field.

  user: |
    Extract structured metadata from the job posting below.

    TITLE:    {title}
    COMPANY:  {company}
    LOCATION: {location}

    DESCRIPTION:
    {description}

    ===OUTPUT SCHEMA===
    Output ONLY the following JSON object — exactly these 15 keys, no extra keys, no markdown fences, no text before or after:
    {
      "work_mode":        "remote" | "hybrid" | "onsite" | null,
      "remote_geo":       string or null,
      "canada_eligible":  "yes" | "no" | "unknown",
      "seniority":        "intern" | "junior" | "mid" | "senior" | "staff" | "principal" | null,
      "role_family":      "data scientist" | "ml engineer" | "mlops engineer" | "data engineer" | "research scientist" | "analyst" | "other",
      "years_exp_min":    integer or null,
      "years_exp_max":    integer or null,
      "minimum_degree":   "high_school" | "associate" | "bachelor" | "master" | "phd" | null,
      "required_skills":  ["string", ...],
      "preferred_skills": ["string", ...],
      "salary_min":       integer or null,
      "salary_max":       integer or null,
      "salary_currency":  "CAD" | "USD" | null,
      "visa_sponsorship": "yes" | "no" | "unknown",
      "red_flags":        ["string", ...]
    }
    ===END SCHEMA===

    FIELD RULES

    COMPLETENESS RULE (CRITICAL):
      For `required_skills` and `preferred_skills`, capture EVERY explicitly mentioned skill/tool/technology/certification/method
      from the posting that belongs in that bucket.
      Do NOT stop at 5-10 examples. Be exhaustive.
      Scan the entire posting, including:
        - intro / "about the role"
        - responsibilities / "what you'll do"
        - requirements / qualifications / must-have
        - preferred / nice-to-have / bonus
        - legal / security / compliance requirements

    SKILL TOKEN DEFINITION:
      Treat each explicit named item as a candidate skill token:
        - programming languages, frameworks, libraries, SDKs
        - cloud/platform tools, MLOps/data tools, databases, APIs/protocols
        - certifications, domain methodologies
      Keep literal names from text (no made-up expansion, no hallucinated aliases).

    DEGREE SEPARATION RULE:
      Degree requirements must be recorded ONLY in `minimum_degree`, not in `required_skills` or `preferred_skills`.
      Example: "Bachelor's in CS required" -> minimum_degree="bachelor"; do not add that degree phrase to skill arrays.

    BUCKETING RULE:
      - If explicitly required/mandatory/minimum/basic -> `required_skills`
      - If explicitly preferred/nice/bonus/plus -> `preferred_skills`
      - If mentioned without clear preference language, use section context:
          * responsibilities + expected stack usage -> required
          * optional/bonus context -> preferred

    DE-DUP RULE:
      - Do not repeat exact duplicates.
      - Keep distinct variants when explicitly written (e.g. "PyTorch" and "TorchServe" are distinct).

    canada_eligible — can the candidate work from Canada?
      "yes"     → remote (worldwide / North America / Canada mentioned), or Canadian office
                  e.g. "Remote — North America" → "yes" | "Toronto, ON" → "yes" | "Remote, Canada OK" → "yes"
      "no"      → US work authorization required, US citizenship/residency required, or US-only office
                  e.g. "must be authorized to work in the US" → "no" | "Remote — United States only" → "no"
      "unknown" → work location / authorization requirements not mentioned

    years_exp — integers only, examples:
      "3+ years experience"   → min=3, max=null
      "3 to 5 years"          → min=3, max=5
      "up to 2 years"         → min=null, max=2

    minimum_degree — the lowest required degree explicitly stated:
      "Bachelor's degree required"     → "bachelor"
      "Master's preferred/required"    → "master"
      "PhD required"                   → "phd"
      "Associate degree"               → "associate"
      "High school diploma or GED"     → "high_school"
      If no explicit minimum degree requirement is stated → null

    salary — always FULL DOLLAR AMOUNTS (not abbreviated):
      "$150k-$200k"           → min=150000, max=200000, currency="USD"
      "$120,000 CAD annually" → min=120000, max=null,   currency="CAD"
      Not mentioned           → min=null, max=null, currency=null

    required_skills — ALL explicitly required or expected-to-use skills/tools/languages/certifications.
      Sections: "Requirements", "Qualifications", "Must Have", "Basic Qualifications", "You Will Need"
      Also include explicit stack items from responsibilities/role-overview when they represent expected day-to-day tools.
      Include: languages, frameworks, libraries, cloud/data/ML tools, databases, APIs/protocols, certifications, methodologies.
      Exclude degree requirements (store degree only in `minimum_degree`).

    preferred_skills — skills listed as optional/desirable.
      Sections: "Nice to Have", "Preferred", "Bonus", "Plus", "Preferred Qualifications"
      Include all explicit optional stack items (frameworks/tools/cloud/services/certs/domains).
      Exclude degree requirements (store degree only in `minimum_degree`).
      If no such section exists → []

    red_flags — copy word-for-word (do NOT paraphrase) phrases signalling Canada-ineligibility:
      e.g. "must be authorized to work in the US", "US citizenship required",
           "does not offer visa sponsorship", "security clearance required"
      If none → []

    visa_sponsorship:
      "yes"     → sponsorship explicitly offered
      "no"      → explicitly declined ("does not sponsor", "cannot sponsor", "no sponsorship")
      "unknown" → not mentioned

    role_family — pick the single closest match:
      "data scientist"      → statistical modelling, ML experiments, predictions
      "ml engineer"         → building / deploying ML models and ML systems
      "mlops engineer"      → ML infrastructure, pipelines, model serving
      "data engineer"       → ETL, data pipelines, data warehousing
      "research scientist"  → academic-style research, novel algorithms, publications
      "analyst"             → BI dashboards, SQL analysis, business reporting
      "other"               → none of the above applies

    ===ONE-SHOT EXAMPLE (reference only — do NOT extract this posting)===

    Posting:
      ML Engineer II — Remote (United States Only) | Acme AI
      Requirements: Bachelor's in CS or equivalent; 3-5 years Python; PyTorch or TensorFlow; REST APIs.
      Nice to Have: Kubernetes, MLflow.
      Compensation: $140,000-$180,000 USD/year.
      Candidates must be authorized to work in the United States. We do not offer visa sponsorship.

    Expected output:
      {
        "work_mode": "remote",
        "remote_geo": "United States only",
        "canada_eligible": "no",
        "seniority": "mid",
        "role_family": "ml engineer",
        "years_exp_min": 3,
        "years_exp_max": 5,
        "minimum_degree": "bachelor",
        "required_skills": ["Python", "PyTorch", "TensorFlow", "REST APIs"],
        "preferred_skills": ["Kubernetes", "MLflow"],
        "salary_min": 140000,
        "salary_max": 180000,
        "salary_currency": "USD",
        "visa_sponsorship": "no",
        "red_flags": ["must be authorized to work in the United States", "We do not offer visa sponsorship"]
      }

    ===END EXAMPLE===

    Now extract the JSON for the posting above (TITLE: {title} / COMPANY: {company}).
    Your response must start with { and end with }. No markdown fences. No explanation.

description_format:
  system: |
    You are a strict markdown formatter for job descriptions.
    Your job is formatting only, not summarization.
    Keep all facts. Do not add facts. Do not remove facts.
    Output valid Markdown only (no HTML, no JSON, no code fences).

  user: |
    Task: Convert RAW DESCRIPTION into clean, readable Markdown for UI display.

    Goal:
    - Improve readability and structure.
    - Preserve content fidelity.
    - Use professional Markdown formatting patterns.

    Hard constraints (must follow):
    1) Keep ALL information from the input.
    2) Do NOT summarize.
    3) Do NOT invent, infer, or rewrite meaning.
    4) Do NOT output HTML, JSON, or explanations.
    5) Do NOT use markdown code fences.
    6) Output Markdown only.

    Markdown formatting rules:
    1) Normalize whitespace:
       - collapse repeated spaces
       - normalize line breaks
       - remove noisy spacing artifacts
    2) Preserve order:
       - keep original semantic order of statements
    3) Section handling:
       - if clear headings exist (e.g., "Responsibilities", "Requirements", "Benefits"), render them as `##` headings
       - if heading-like labels are inline, move them to their own line and render as `##` headings
      - if no clear headings, keep text as-is without adding new headings
    4) Lists:
       - convert obvious list items into one item per line
       - use `- ` bullet prefix consistently
       - use numbered lists only when order/sequence is explicit in the source
       - keep item text unchanged except cleanup
    5) Sentences:
       - keep original claims, numbers, constraints, locations, and eligibility language exactly in meaning
       - keep technology and skill names exactly as written
        - do not split or merge sentences unless necessary for formatting
    6) Optional markdown enhancements:
       - use concise emphasis (`**bold**`) only for existing labels/keywords (not for new claims)
       - if compensation appears as structured ranges/fields, you may render it as a compact markdown table
       - do not over-format; prefer clarity and consistency
    7) Fallback behavior:
       - if structure is unclear, prefer minimal edits (whitespace + line breaks only)
       - never drop uncertain content; keep it verbatim

    Micro examples:
    Example A (messy -> clean)
    Input:
    Responsibilities:Build ML models;deploy APIs; monitor performance
    Output:
    ## Responsibilities
    - Build ML models
    - deploy APIs
    - monitor performance

    Example B (must preserve restrictions)
    Input:
    Must be authorized to work in the US. No visa sponsorship.
    Output:
    ## Eligibility
    Must be authorized to work in the US.
    No visa sponsorship.

    Metadata (context only):
    TITLE: {title}
    COMPANY: {company}
    LOCATION: {location}

    RAW DESCRIPTION:
    {description}
