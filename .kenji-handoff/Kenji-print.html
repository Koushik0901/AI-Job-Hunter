<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Kenji — Print</title>
  <link rel="stylesheet" href="styles.css?v=3"/>
  <style>
    @page {
      size: 1400px 960px;
      margin: 0;
    }
    html, body {
      margin: 0; padding: 0;
      background: var(--surface);
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .page {
      width: 1400px;
      height: 960px;
      overflow: hidden;
      page-break-after: always;
      break-after: page;
      page-break-inside: avoid;
      break-inside: avoid;
      position: relative;
      background: var(--surface);
    }
    .page:last-child { page-break-after: auto; break-after: auto; }

    /* Neutralize sticky/scrolls for print */
    .page .sidebar { position: static !important; height: 960px !important; }
    .page .topbar { position: static !important; }
    .page .app { grid-template-columns: 240px 1fr !important; min-height: 960px !important; max-height: 960px !important; }
    .page textarea { pointer-events: none; }
    .page * { animation: none !important; transition: none !important; }

    /* Page caption (printed bottom-right, tiny) */
    .page-caption {
      position: absolute; right: 28px; bottom: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--outline);
      letter-spacing: 0.08em; text-transform: uppercase;
      z-index: 100;
    }

    /* Hide tweaks panel */
    .tweaks { display: none !important; }

    @media print {
      body { margin: 0; }
      .page { box-shadow: none !important; }
    }
  </style>
  <script>
    window.KENJI_TWEAKS = { "density": "comfortable", "agentVoice": "warm" };
    window.KENJI_PRINT = true;
  </script>
</head>
<body class="density-comfortable">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="data.jsx" data-plugins="transform-react-jsx-source" data-filename="data.jsx"></script>
  <script type="text/babel" src="ui.jsx" data-plugins="transform-react-jsx-source" data-filename="ui.jsx"></script>
  <script type="text/babel" src="shell.jsx" data-plugins="transform-react-jsx-source" data-filename="shell.jsx"></script>
  <script type="text/babel" src="discover.jsx" data-plugins="transform-react-jsx-source" data-filename="discover.jsx"></script>
  <script type="text/babel" src="command.jsx" data-plugins="transform-react-jsx-source" data-filename="command.jsx"></script>
  <script type="text/babel" src="resume.jsx" data-plugins="transform-react-jsx-source" data-filename="resume.jsx"></script>
  <script type="text/babel" src="stories.jsx" data-plugins="transform-react-jsx-source" data-filename="stories.jsx"></script>

  <script type="text/babel" data-plugins="transform-react-jsx-source">
    const { useState, useEffect, useRef, useMemo } = React;

    const ScreenPage = ({ screen, label, children }) => (
      <div className="page">
        <div className="app">
          <Sidebar screen={screen} setScreen={() => {}} unread={false}/>
          <div className="main">
            <TopBar screen={screen}/>
            <div style={{ flex: 1, minWidth: 0 }}>
              {children}
            </div>
          </div>
        </div>
        <div className="page-caption">kenji · {label}</div>
      </div>
    );

    const PrintApp = () => {
      const noop = () => {};
      const target = window.KENJI_DATA.jobs[0];
      return (
        <>
          <ScreenPage screen="discover" label="01 / 04 · discover">
            <Discover onOpenJob={noop}/>
          </ScreenPage>
          <ScreenPage screen="command" label="02 / 04 · command">
            <Command setScreen={noop} setTargetJob={noop} voice="warm"/>
          </ScreenPage>
          <ScreenPage screen="resume" label="03 / 04 · resume lab">
            <ResumeLab job={target}/>
          </ScreenPage>
          <ScreenPage screen="stories" label="04 / 04 · user stories">
            <Stories/>
          </ScreenPage>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<PrintApp/>);

    // Auto-print after fonts + layout settle
    (async () => {
      try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
      await new Promise(r => setTimeout(r, 900));
      window.print();
    })();
  </script>
</body>
</html>
