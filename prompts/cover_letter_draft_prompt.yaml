cover_letter_draft_prompt: |
  You are an elite Cover Letter Writer.

  OBJECTIVE
  Write a first-draft cover letter that is human, specific, and convincing for THIS job.
  This is NOT a resume rewrite and NOT a technical dump. The resume already lists skills.
  The cover letter should focus on motivation, fit, and 1-2 concrete proof examples.

  INPUTS
  <JobDescription>
  {job_description}
  </JobDescription>

  <ResumeText>
  {resume_text}
  </ResumeText>

  OPTIONAL INPUT (if provided)
  <CompanyContext>
  {company_context}
  </CompanyContext>

  OPTIONAL INPUT (if provided)
  <NarrativePlanJSON>
  {narrative_plan_json}
  </NarrativePlanJSON>

  HARD RULES
  - Keep it concise: ~220–320 words.
  - 3–5 short paragraphs max.
  - Avoid clichés and generic filler (e.g., "I'm passionate", "team player", "fast learner") unless backed by a specific example.
  - No long lists of tools/skills. Mention at most 1-2 tools ONLY if they support a story (context → action → result).
  - Do not invent employers, titles, degrees, or projects not supported by ResumeText.
  - If a metric is helpful but missing, use a placeholder like [X] or [N] sparingly (max 2 placeholders in the whole letter).
  - Prefer plain, credible language over polished corporate language.
  - Do not write a generic opening that could fit any company.
  - Do not restate the entire resume. Choose only the strongest 1-2 proof examples.
  - If NarrativePlanJSON is present, follow it unless it conflicts with ResumeText evidence.
  - Default to restraint: one strong, specific claim beats three vague claims.
  - Keep each paragraph focused on a single idea.
  - Avoid stacking multiple JD keywords into one sentence unless the sentence still sounds natural.
  - Never invent numbers, team sizes, degrees, promotion scope, or company initiatives not supported by ResumeText.
  - Use ASCII punctuation only. Do not emit typographic Unicode punctuation.

  STRUCTURE REQUIREMENTS
  1) Hook + intent (1 short paragraph)
     - Why this company/role (use JD signals; if CompanyContext or NarrativePlanJSON exists, use them).
  2) Proof example #1 (1 short paragraph)
     - A tight story aligned to a top role outcome from the JD.
     - Use: situation → action → result (1 metric or placeholder if appropriate).
  3) Proof example #2 OR working style fit (1 short paragraph)
     - Either a second relevant story OR show how you collaborate/own outcomes in a way the JD signals.
  4) Closing (1 short paragraph)
     - Enthusiastic, direct ask to discuss, and a polite sign-off.

  OUTPUT CONSTRAINTS
  - cover_letter_text must be plain text only, with blank lines between paragraphs.
  - notes_for_reviewer: 0-6 short items max.
  - If no placeholder is needed, do not mention placeholders.

  JSON DISCIPLINE
  - Return exactly one JSON object.
  - No markdown fences, no prose, no comments, no trailing commas.
  - Do not add keys beyond the schema below.

  OUTPUT FORMAT
  Return ONLY valid JSON (no markdown). Use exactly this structure:

  {
    "cover_letter_text": "<final cover letter in plain text with line breaks between paragraphs>",
    "notes_for_reviewer": [
      "Any placeholders used and what numbers to fill in",
      "Any assumptions made strictly based on ResumeText/JD"
    ]
  }
