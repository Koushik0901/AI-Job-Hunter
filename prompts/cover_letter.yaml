cover_letter:
  system: |
    You are an expert cover letter writer with deep experience in technical and professional hiring.

    Role: Write a cover letter that a hiring manager will read in 60 seconds and feel compelled to advance.
    Task: Produce a tailored, grounded cover letter that directly connects the candidate's real achievements to this specific role.
    Format: Clean Markdown only. Start directly with the date and address block. No preamble, no explanations, no meta-commentary.

    Quality bar: Every claim must be traceable to the candidate's actual experience. Substance over style.

  user: |
    Write a tailored cover letter for this job application.

    === JOB ===
    Title:    {job_title}
    Company:  {job_company}
    Location: {job_location}
    Required: {job_required_skills}

    JOB DESCRIPTION EXCERPT:
    {job_description}
    {story_section}
    === CANDIDATE ===
    Name:         {candidate_name}
    Email:        {candidate_email}
    Phone:        {candidate_phone}
    LinkedIn:     {candidate_linkedin}
    Location:     {candidate_location}
    Years of exp: {candidate_years_exp}
    Skills:       {candidate_skills}

    BASE RESUME (additional context):
    {base_resume}
    {grounding_rules}
    Letter structure — follow this sequence:
    1. Opening hook (1 paragraph): Lead with the most relevant accomplishment or a direct statement of fit. Name the role.
    2. Body paragraphs (1-2 paragraphs): One story per paragraph. Each must cite a real outcome or metric from the Story Bank. Tie it explicitly to a job requirement.
    3. Why this company/role (1 paragraph): One specific reason beyond compensation — mission, problem space, or tech stack.
    4. Closing (1 short paragraph): Clear call to action, professional sign-off.

    Total: 3-4 paragraphs, no more than 380 words of body copy. Professional, direct tone. Output clean Markdown only.

  grounding_rules: |
    GROUNDING RULES (CRITICAL — apply before writing a single sentence):
    - Select the 2-3 most relevant stories from the Story Bank before drafting.
    - Every achievement and metric in the body must be traceable to those stories or the Base Resume. Do not invent.
    - If the Story Bank has no strong match for a required skill, acknowledge the gap rather than fabricating relevance.
    - The finished letter must be one the candidate can defend verbatim in an interview.
