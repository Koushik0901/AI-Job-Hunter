json_repair_prompt: |
  Your previous response was invalid for schema parsing.
  Return ONLY one valid JSON object matching the required schema, with no markdown and no extra text.
  Keep the exact top-level keys required by the original schema.
  Do not add comments, explanations, markdown fences, or trailing commas.
  If a field is unknown, use the schema-safe empty value already implied by the prompt, not a made-up value.

  Validation error:
  {validation_error}

  Previous output:
  {bad_output}
