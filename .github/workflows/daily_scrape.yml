name: Daily Job Scrape

on:
  schedule:
    - cron: '0 17 * * *'  # 10:00 AM MST / Edmonton (UTC-7) — becomes 11:00 AM in summer (MDT)
  workflow_dispatch:       # allows manual trigger from the GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      # Restore the jobs DB from the previous run so deduplication works.
      # The key changes every run so a fresh save is always created;
      # restore-keys finds the most recent previous cache on cache miss.
      - name: Restore jobs database
        uses: actions/cache@v4
        with:
          path: jobs.db
          key: jobs-db-${{ github.run_id }}
          restore-keys: jobs-db-

      - name: Run scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: uv run python scrape.py
