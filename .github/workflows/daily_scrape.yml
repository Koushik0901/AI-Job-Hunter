name: Daily Job Scrape

on:
  schedule:
    - cron: '0 17 * * *'  # 10:00 AM MST / Edmonton (UTC-7) — becomes 11:00 AM in summer (MDT)
  workflow_dispatch:       # allows manual trigger from the GitHub Actions UI

jobs:
  scrape_only:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DASHBOARD_CACHE_DISABLED: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Verify required secrets
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          missing=0
          for name in TURSO_URL TURSO_AUTH_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing GitHub secret::$name is not configured for the scheduled scrape workflow."
              missing=1
            fi
          done
          exit "$missing"

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libcairo2-dev pkg-config

      - name: Run scraper (no LLM enrichment)
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: uv run ai-job-hunter scrape --no-enrich-llm
