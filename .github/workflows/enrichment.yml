name: Job Enrichment

on:
  schedule:
    - cron: "30 17 * * *" # 30 minutes after scrape
  workflow_dispatch:
    inputs:
      processing_mode:
        description: "Enrichment/reformat processing mode"
        required: true
        default: "enrich_backfill"
        type: choice
        options:
          - enrich_backfill
          - re_enrich_all
          - jd_reformat_missing
          - jd_reformat_all

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DASHBOARD_CACHE_DISABLED: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Verify required secrets
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          missing=0
          for name in TURSO_URL TURSO_AUTH_TOKEN OPENROUTER_API_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing GitHub secret::$name is not configured for the scheduled enrichment workflow."
              missing=1
            fi
          done
          exit "$missing"

      - name: Run enrichment
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ENRICHMENT_MODEL: ${{ secrets.ENRICHMENT_MODEL }}
          DESCRIPTION_FORMAT_MODEL: ${{ secrets.DESCRIPTION_FORMAT_MODEL }}
        run: |
          processing_mode="${{ github.event.inputs.processing_mode || 'enrich_backfill' }}"
          if [ "$processing_mode" = "re_enrich_all" ]; then
            uv run python src/cli.py scrape --re-enrich-all
          elif [ "$processing_mode" = "jd_reformat_missing" ]; then
            uv run python src/cli.py scrape --jd-reformat-missing
          elif [ "$processing_mode" = "jd_reformat_all" ]; then
            uv run python src/cli.py scrape --jd-reformat-all
          else
            uv run python src/cli.py scrape --enrich-backfill
          fi
