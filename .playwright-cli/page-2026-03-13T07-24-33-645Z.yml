\maincolumnwidth}%\\n\\\\small#7%\\n\\\\end{minipage}}\\\\fi%\\n\\\\par\\\\addvspace{#1}}\\n\\\\begin{document}\\n\\\\makecvtitle\\n\\\\vspace*{-14mm}\\n\\n\\\\begin{center}\\n\\t\\\\begin{tabular}{ c c c }\\n\\t\\t\\\\faMobile\\\\enspace +1 (236) 882-7140 & \\\\enspace\\\\faEnvelope\\\\enspace \\\\href{mailto:koushik.nov01@gmail.com}{koushik.nov01@gmail.com} & \\\\enspace\\\\faHome\\\\enspace Edmonton, AB \\\\\\\\[2mm]\\n\\t\\t\\\\vspace*{-2mm}\\n\\t\\t\\\\faLinkedin\\\\enspace \\\\href{https://www.linkedin.com/in/koushik-sivarama-krishnan/}{\\\\textcolor{customblue}{LinkedIn}} &\\n\\t\\t\\\\faGithub\\\\enspace \\\\href{https://github.com/Koushik0901}{\\\\textcolor{customblue}{Github}} & \\\\faGlobe\\\\enspace \\\\href{https://koushik0901.github.io/}{\\\\textcolor{customblue}{Portfolio}}\\n\\t\\\\end{tabular}\\n\\\\end{center}\\n\\\\hrulefill\\n\\\\bigskip\\n\\n\\\\today \\\\par \\\\vspace{6pt}\\n\\n\\\\justifying\\n\\n%<CL_START>\\nI’m excited to apply for the AI Automation Engineer role in Calgary. The focus on AI‑first, end‑to‑end tool development aligns perfectly with my recent work delivering production LLM‑driven assistants, and I’m eager to bring that hands‑on mindset to a collaborative, on‑site team.\\n\\nAt the Insurance Corporation of British Columbia I started by shadowing claims adjusters to see how searching policy manuals slowed live calls. I then designed and shipped an agentic AI assistant using FastAPI, LangChain, Milvus and Azure Kubernetes Service. The system cut knowledge‑retrieval time by 60\\\\%, served over 100 adjusters with 500+ daily queries, and maintained about 99.2\\\\% uptime thanks to built‑in retry logic, circuit‑breaker patterns, and a continuous evaluation harness covering accuracy, faithfulness, latency and bias. Transparent source citations and confidence signals turned early skepticism into steady adoption.\\n\\nEarlier, as a Computer Vision Intern at Drive Analytics, I built a production video‑analytics pipeline for baseball that processed roughly 10,000 clips per day within a two‑hour turnaround. Using AWS, Docker, Celery and RabbitMQ I integrated detection, tracking and event‑timing logic, and added health checks, structured logging and automated rollback procedures to guarantee reliable outputs despite variable camera angles and lighting. This experience reinforced my ability to deliver full‑stack services that meet strict latency and robustness requirements.\\n\\nI would welcome the chance to discuss how my experience can accelerate your AI‑first automation roadmap; I am available next week for a conversation and can relocate to Calgary immediately.\\n%<CL_END>\\n\\n\\\\end{document}\\n\" }"
