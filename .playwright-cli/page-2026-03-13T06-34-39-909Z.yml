                        - listitem [ref=e829]: Built audio pipelines using STFT, mel-spectrograms, and custom preprocessing across diverse audio formats.
                        - listitem [ref=e830]: Strong foundation in speech synthesis, transcription, preprocessing, and audio representation learning.
