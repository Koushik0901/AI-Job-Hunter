                      - list [ref=e832]:
                        - listitem [ref=e833]: Built a pathology AI system to classify the origin of ischemic stroke clots from whole-slide pathology images.
                        - listitem [ref=e834]: Designed a two-stage pipeline with background / tissue detection and fine-tuned slide-level classification.
                        - listitem [ref=e835]: Achieved F1 = 96.3 on held-out data over the best PoolFormer baseline.
                        - listitem [ref=e836]: Released pretrained weights and a Dockerized web app and carried the work through publication / arXiv release.
                        - listitem [ref=e837]: Strong signal for scientific rigor, reproducibility, and ability to take a project beyond a prototype.
                      - heading "Cross-Cutting Strengths" [level=2] [ref=e838]
