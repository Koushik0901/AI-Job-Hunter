                      - heading "Candidate Summary" [level=1] [ref=e752]
                      - paragraph [ref=e753]: "Koushik Sivarama Krishnan is a machine learning engineer / applied AI engineer with 3+ years of experience building production ML, computer vision, speech, and retrieval-augmented AI systems. His strongest pattern across roles is turning technically promising ideas into deployable systems that users can trust: grounded outputs, clear evaluation, strong operational discipline, and design choices driven by actual workflow needs."
                      - heading "ICBC - Enterprise RAG Assistant for Claims Adjusters" [level=2] [ref=e754]
                      - list [ref=e755]:
                        - listitem [ref=e756]: Built and deployed an in-house agentic AI assistant for insurance claims adjusters using FastAPI, LangChain, Milvus, MCP servers, and Azure Kubernetes Service.
                        - listitem [ref=e757]: Reduced knowledge retrieval time by 60%, supported 100+ adjusters, handled 500+ daily queries, and maintained about 99.2% uptime.
                        - listitem [ref=e758]: "Started by shadowing claims adjusters to understand the real bottleneck: people were losing time searching across policy manuals, internal pages, and procedures while actively handling customer calls."
                        - listitem [ref=e759]:
                          - text: "Designed the system to earn trust, not just answer questions:"
                          - list [ref=e760]:
                            - listitem [ref=e761]: always show source citations so adjusters can verify
                            - listitem [ref=e762]: expose confidence signals so users know when to double-check
                            - listitem [ref=e763]: keep answers concise and fast enough for real call workflows
                            - listitem [ref=e764]: continuously evaluate accuracy, faithfulness, latency, consistency, and bias
                        - listitem [ref=e765]:
                          - text: "Made architecture choices based on constraints:"
                          - list [ref=e766]:
                            - listitem [ref=e767]: FastAPI for async performance and clear API docs
                            - listitem [ref=e768]: Milvus because self-hosting and data control mattered
                            - listitem [ref=e769]: AKS because the system needed to scale and recover reliably
                            - listitem [ref=e770]: reranking and structured chunking to improve retrieval quality without blowing latency budgets
                        - listitem [ref=e771]:
                          - text: "A major leadership moment came during a production deployment crisis:"
                          - list [ref=e772]:
                            - listitem [ref=e773]: cluster crash during scale-up on a Friday before a Monday executive presentation
                            - listitem [ref=e774]: rolled back immediately to protect current users
                            - listitem [ref=e775]: reproduced the issue in staging, found connection-pooling and scaling problems, added monitoring, load-tested for 24 hours, and executed a staged rollout
                            - listitem [ref=e776]: restored confidence through calm communication, root-cause fixes, and visible risk controls
                        - listitem [ref=e777]: "Strong evidence of user-centered AI: people initially feared the system might replace them, but adoption grew because the system was transparent, bounded, and genuinely useful in their workflow."
                      - heading "Justice Data and Design Lab - Legal RAG Improvement" [level=2] [ref=e778]
                      - list [ref=e779]:
                        - listitem [ref=e780]: Worked with MITACS researchers and legal domain experts to improve access to legal information for underserved communities.
                        - listitem [ref=e781]: Improved a legal chatbot from about 30% useful responses to about 60% useful responses.
                        - listitem [ref=e782]: Focused on retrieval quality because root-cause analysis showed that weak answers came mainly from poor context retrieval, not only from model generation quality.
                        - listitem [ref=e783]: Improved section-based chunking and added reranking for legal documents, which better preserved semantic units and increased retrieval precision.
                        - listitem [ref=e784]: Prioritized citation accuracy and trust over aggressive answer coverage because incorrect grounding in legal settings creates real risk.
                        - listitem [ref=e785]:
                          - text: "Strong example of bridging research and production:"
                          - list [ref=e786]:
                            - listitem [ref=e787]: translated academic ideas into systems that balanced accuracy, cost, latency, and reliability
                            - listitem [ref=e788]: worked with legal professionals who cared about trust and deployability, not just benchmark improvements
                            - listitem [ref=e789]: combined technical iteration with domain-aware product thinking
                      - heading "SeiSei.ai - Voice and Audio ML" [level=2] [ref=e790]
                      - list [ref=e791]:
                        - listitem [ref=e792]: Served as a founding machine learning engineer and effectively the first engineering hire on a voice / audio ML effort.
                        - listitem [ref=e793]:
                          - text: "Built end-to-end pieces of a voice and lip-sync pipeline:"
                          - list [ref=e794]:
                            - listitem [ref=e795]: Hindi audio data collection
                            - listitem [ref=e796]: preprocessing and feature engineering
                            - listitem [ref=e797]: benchmarking TortoiseTTS, FreeVC, and speaker-encoder-based approaches
                            - listitem [ref=e798]: post-processing for better naturalness, pauses, and intonation
                        - listitem [ref=e799]: Improved Hindi voice-conversion performance by 15%.
                        - listitem [ref=e800]: Built systems processing 5000+ hours of audio content.
                        - listitem [ref=e801]: "Key technical lesson: the bottleneck was not only training hyperparameters; preprocessing assumptions were wrong for Hindi phonetics. After changing mel-spectrogram and pitch-handling choices, quality improved significantly."
                        - listitem [ref=e802]:
                          - text: "Also helped build team capacity:"
                          - list [ref=e803]:
                            - listitem [ref=e804]: guided interns
                            - listitem [ref=e805]: distributed work based on strengths
                            - listitem [ref=e806]: removed blockers
                            - listitem [ref=e807]: kept stakeholders and clients in the feedback loop
                        - listitem [ref=e808]: Used Truefoundry and Kubernetes to move the pipeline from experimentation toward monitored, deployable use.
                      - heading "Drive Analytics - Production Sports Computer Vision" [level=2] [ref=e809]
                      - list [ref=e810]:
                        - listitem [ref=e811]: Built computer vision systems for baseball and basketball analytics in production settings where reliability and turnaround time mattered.
                        - listitem [ref=e812]: Worked on player tracking, pose / stance analysis, ball / bat / glove detection, event timing, and multi-view signal stitching.
                        - listitem [ref=e813]: Operated in a high-throughput environment processing roughly 10k clips per day with about a 2-hour turnaround target.
                        - listitem [ref=e814]: Used AWS, Celery, RabbitMQ, Docker, and production pipeline design to support real workloads rather than isolated demos.
                        - listitem [ref=e815]:
                          - text: "Strong real-world engineering mindset:"
                          - list [ref=e816]:
                            - listitem [ref=e817]: optimized for trustworthy outputs, not just model demos
                            - listitem [ref=e818]: treated uncertain or low-quality inputs carefully instead of silently returning misleading analytics
                            - listitem [ref=e819]: designed for difficult conditions such as varied resolutions, camera motion, multiple views, occlusions, and weather effects
                        - listitem [ref=e820]:
                          - text: "Important accountability story:"
                          - list [ref=e821]:
                            - listitem [ref=e822]: deployed an optimization that improved speed but caused a subtle tracking bug in a small edge case
                            - listitem [ref=e823]: acknowledged the issue immediately, rolled back, fixed it properly, added tests, and improved the team’s testing discipline
                            - listitem [ref=e824]: preserved client trust through honesty and thorough follow-through
