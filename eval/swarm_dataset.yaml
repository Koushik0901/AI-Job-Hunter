  title: AI Engineer - FDE (Forward Deployed Engineer)
  job_description: "# AIEngineer - FDE (Forward Deployed Engineer)  \n**Company:**\
    \ Databricks  \n**Location:** Canada  \n\nCSQ227R16 The AI Forward Deployed Engineering\
    \ (AI FDE) team is a highly specialized customer\u2011facing AI team at Databricks.\
    \ We deliver professional services engagements to help our customers build and\
    \ productionize first\u2011of\u2011its\u2011kind AI applications. We work cross\u2011\
    functionally to shape long\u2011term strategic priorities and initiatives alongside\
    \ engineering, product, and developer relations, as well as support internal subject\
    \ matter expert (SME) teams. We view our team as an ensemble: we look for individuals\
    \ with strong, unique specializations to improve the overall strength of the team.\
    \ This team is the right fit for you if you love working with customers, teammates,\
    \ and fueling your curiosity for the latest trends in GenAI, LLMOps, and ML more\
    \ broadly. This role can be remote.  \n\n## Impact you will have\n- Develop cutting\u2011\
    edge GenAI solutions, incorporating the latest techniques from our Mosaic AI Research\
    \ to solve customer problems.  \n- Own production rollouts of consumer and internally\
    \ facing GenAI applications.  \n- Serve as a trusted technical advisor to customers\
    \ across a variety of domains.  \n- Present at conferences such\u202Fas Data +\
    \ AI Summit, recognized as a thought leader internally and externally.  \n- Collaborate\
    \ cross\u2011functionally with the product and engineering teams to influence\
    \ priorities and shape the product roadmap.  \n\n## What we look for\n- Experience\
    \ building GenAI applications, including RAG, multi\u2011agent systems, Text2SQL,\
    \ fine\u2011tuning, etc., with tools such as HuggingFace, LangChain, and DSPy.\
    \  \n- Expertise in deploying production\u2011grade GenAI applications, including\
    \ evaluation and optimizations.  \n- Extensive years of hands\u2011on industry\
    \ data science experience, leveraging common machine learning and data science\
    \ tools (i.e., pandas, scikit\u2011learn, PyTorch, etc.).  \n- Experience building\
    \ production\u2011grade machine learning deployments on AWS, Azure, or GCP.  \n\
    - Graduate degree in a quantitative discipline (Computer Science, Engineering,\
    \ Statistics, Operations Research, etc.) or equivalent practical experience. \
    \ \n- Experience communicating and/or teaching technical concepts to non\u2011\
    technical and technical audiences alike.  \n- Passion for collaboration, life\u2011\
    long learning, and driving business value through AI.  \n- **[Preferred]** Experience\
    \ using the Databricks Intelligence Platform and Apache Spark\u2122 to process\
    \ large\u2011scale distributed datasets.  \n\n## Pay Range Transparency  \nDatabricks\
    \ is committed to fair and equitable compensation practices. The pay range for\
    \ this role is listed below and represents the expected salary range for non\u2011\
    commissionable roles or on\u2011target earnings for commissionable roles. Actual\
    \ compensation packages are based on several factors that are unique to each candidate,\
    \ including but not limited to job\u2011related skills, depth of experience, relevant\
    \ certifications and training, and specific work location. Based on the factors\
    \ above, Databricks anticipates utilizing the full width of the range. The total\
    \ compensation package for this position may also include eligibility for annual\
    \ performance bonus, equity, and the benefits listed above.  \n\n**Canada Pay\
    \ Range:** $162,400\u202F\u2014\u202F$223,384\u202FCAD  \n\n## About Databricks\
    \  \nDatabricks is the data and AI company. More than 10,000 organizations worldwide\
    \ \u2014 including Comcast, Cond\xE9\u202FNast, Grammarly, and over 50\u202F%\
    \ of the Fortune\u202F500 \u2014 rely on the Databricks Data Intelligence Platform\
    \ to unify and democratize data, analytics and AI. Databricks is headquartered\
    \ in San Francisco, with offices around the globe and was founded by the original\
    \ creators of Lakehouse, Apache Spark\u2122, Delta Lake and MLflow. To learn more,\
    \ follow Databricks on Twitter, LinkedIn and Facebook.  \n\n## Benefits  \nAt\
    \ Databricks, we strive to provide comprehensive benefits and perks that meet\
    \ the needs of all of our employees. For specific details on the benefits offered\
    \ in your region, please visit https://www.mybenefitsnow.com/databricks.  \n\n\
    ## Our Commitment to Diversity and Inclusion  \nAt Databricks, we are committed\
    \ to fostering a diverse and inclusive culture where everyone can excel. We take\
    \ great care to ensure that our hiring practices are inclusive and meet equal\
    \ employment opportunity standards. Individuals looking for employment at Databricks\
    \ are considered without regard to age, color, disability, ethnicity, family or\
    \ marital status, gender identity or expression, language, national origin, physical\
    \ and mental ability, political affiliation, race, religion, sexual orientation,\
    \ socio\u2011economic status, veteran status, and other protected characteristics.\
    \  \n\n## Compliance  \nIf access to export\u2011controlled technology or source\
    \ code is required for performance of job duties, it is within the employer\u2019\
    s discretion whether to apply for a U.S. government license for such positions,\
    \ and the employer may decline to proceed with an applicant on this basis alone."
