  brag_document_markdown: "Co-op Data Scientist - Insurance Corporation of British\
    \ Columbia (ICBC)\n- Led development and deployment of ICBC\u2019s in-house agentic\
    \ AI assistant using Retrieval Augmented Generation (RAG) with LangChain, Milvus,\
    \ and MCP servers\u2014reducing knowledge retrieval time by \u223C60% for 100+\
    \ daily users via Azure Kubernetes Service.\n- Designed and implemented systematic\
    \ evaluation frameworks to benchmark LLM performance and robustness, using metrics\
    \ like accuracy, faithfulness, response consistency, and bias, significantly improving\
    \ model reliability in production environments.\n- Built a CatBoost risk-prioritization\
    \ model on structured case features; implemented class-imbalance handling, k-fold\
    \ CV, and probability calibration, with SHAP reports for case-level explanations\
    \ consumed by the CMA team.\n\nResearch Engine Developer - Justice Data and Design\
    \ Lab\n- Collaborated with MITACS to leverage data analysis and machine learning,\
    \ aiming to enhance access to justice through evidence-based opportunities.\n\
    - Doubled the performance and efficiency of the research engine chatbot using\
    \ Retrieval Augmented Generation (RAG) to better identify and address unmet legal\
    \ needs.\n- Conducted advanced data analysis on large-scale legal text datasets\
    \ from Reddit and People\u2019s Law School using Topic Modeling techniques and\
    \ Power BI visualizations to extract key insights and refine legal service strategies.\n\
    \nFounding Machine Learning Engineer - SeiSei.ai\n- Fine-tuned FreeVC voice conversion\
    \ model with 15% performance improvement on Hindi audio through advanced hyperparameter\
    \ optimization and custom audio preprocessing pipelines.\n- Architected automated\
    \ audio processing systems handling 5000+ hours of diverse audio content, implementing\
    \ feature extraction, audio quality assessment, and batch processing workflows.\n\
    - Directed and supervised a team of interns in the deployment of machine learning\
    \ models using Truefoundry, enhancing project delivery and meeting key performance\
    \ targets.\n\nComputer Vision Intern - Drive Analytics\n- Engineered a Major League\
    \ Baseball video analytics system and deployed it on AWS using Celery, RabbitMQ,\
    \ and Django.\n- Led a team in implementing image-to-3D model rendering with advanced\
    \ vision techniques, boosting profits by 10% through innovation and teamwork.\n\
    - Orchestrated comparative analysis of various object detection models for glove\
    \ and baseball detection.\n\nDeep Learning Intern - MURF.ai\n- Developed and deployed\
    \ a voice cloning application using the FastSpeech-2 algorithm, implementing advanced\
    \ audio processing pipelines with librosa and custom preprocessing techniques\
    \ for high-quality speech synthesis.\n- Fine-tuned Speech-to-Text models using\
    \ Azure Speech Studio with focus on acoustic feature extraction and audio signal\
    \ processing for improved transcription accuracy.\n- Built end-to-end audio processing\
    \ pipelines handling diverse audio formats, implementing STFT, mel-spectrograms,\
    \ and other audio representations for model training.\n\nGenZ AI Therapist \xA7\
    \n- Built a non-clinical GenZ-friendly mental wellness AI Assistant with advanced\
    \ prompt engineering techniques to provide a safe, empathetic space for users\
    \ to vent and reflect\u2014offering sentiment/intent analysis, emotional trend\
    \ tracking, and real-time resource suggestions without giving clinical advice.\n\
    - Implemented Multi-Agent architecture using CrewAI, combining custom LLM agents\
    \ for session summarization, mood visualization (Plotly), guardrails, and Google-integrated\
    \ resource search (Serper.dev), all deployed through an interactive Streamlit\
    \ interface.\n- Designed guardrails agents and session filters to detect crisis\
    \ signals and moderate unsafe or irrelevant content, ensuring respectful and focused\
    \ conversations aligned with mental wellness goals.\n\nClotSense \u2014 Stroke\
    \ Blood Clot Origin Identification \xA7\n- Built an automated pathology AI to\
    \ classify the origin of ischemic stroke clots (Cardioembolic vs. Large Artery\
    \ Atherosclerosis) from whole-slide digital pathology images (WSIs) supporting\
    \ faster, targeted secondary prevention decisions in the care pathway.\n- Designed\
    \ a novel two-stage pipeline: a MobileNetV3 background/tissue detector to tile\
    \ WSIs, followed by fine-tuned classifiers aggregated to slide-level predictions;\
    \ released pretrained weights and a Dockerized web app for reproducible local\
    \ validation.\n- Drove the model to F1 = 96.3 on a held-out dataset over the best\
    \ PoolFormer baseline and published a research work on it."
