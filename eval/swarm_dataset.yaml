  job_description: "## Machine Learning Software Engineer\n\nJob available in 4locations\
    \  \nVANCOUVER, British Columbia, Canada  \nWATERLOO, Ontario, Canada  \nCALGARY,\
    \ Alberta, Canada  \nTORONTO, Ontario, Canada  \n\n**Platform:** TECHNOLOGY AND\
    \ OPERATIONS  \n**Sub Category:** Research  \n**Type:** Full time  \n**Application\
    \ Deadline:** 04/27/2026  \n**Req ID:** R-0000124116  \n\n## Job Description\n\
    \n### What's the opportunity?\n\nWe\u2019re looking for an enthusiastic software\
    \ developer who\u2019s excited by the opportunity of working on challenging problems\
    \ at the intersection of machine learning and the financial services industry.\
    \ As a Machine Learning Software Engineer, you\u2019ll be responsible for owning\
    \ and delivering a project end to end \u2013 everything from data pre-processing\
    \ and exploration, to building and scaling ML algorithms and pipelines, to deployment\
    \ and monitoring of production systems. At RBC Borealis, you\u2019ll be joining\
    \ a team that works directly with leading researchers in machine learning, has\
    \ access to rich and massive datasets, and offers the computational resources\
    \ to support cutting\u2011edge machine learning R&D.\n\n### Your responsibilities\
    \ include:\n\n- Build cutting edge ML solutions throughout the research and product\
    \ development lifecycle  \n- Play a key role in the design and development of\
    \ Borealis\u2019 machine learning products  \n- Partner with RBC Borealis\u2019\
    s research and product teams to ensure the seamless delivery of these products\
    \  \n- Apply engineering and data best practices to build robust and scalable\
    \ large\u2011scale machine learning software systems  \n- Support projects with\
    \ thorough documentation, design decisions, and technical advisory  \n\n### You're\
    \ our ideal candidate if you have:\n\n- Experience building modular and robust\
    \ software systems in Python or similar language  \n- Knowledge of professional\
    \ software engineering best practices for the full software development life cycle,\
    \ including testing methods, coding standards, code reviews and source control\
    \ management  \n- Experience working across the entire ML research and product\
    \ lifecycle from prototyping to production is a plus  \n- Experience building\
    \ microservices, data pipelines and using relational and non\u2011relational databases\
    \ is a plus  \n- Experience working with data science tooling and deep learning\
    \ frameworks is a plus  \n- Experience with DevOps engineering (CI/CD pipelines,\
    \ observability, containers etc) is a plus  \n\n### What's in it for you?\n\n\
    - Be part of a dynamic & flexible working environment  \n- Become part of a team\
    \ that thinks progressively and works collaboratively. We care about seeing each\
    \ other reach full potential  \n- Leaders who support your development through\
    \ coaching and managing opportunities  \n- Ability to make a difference and lasting\
    \ impact from a local-to-global scale  \n\n## About RBC Borealis\n\nRBC Borealis\
    \ is the driving force behind Royal Bank of Canada\u2019s AI and data innovation.\
    \ As part of Canada\u2019s largest financial institution, we bring together a\
    \ team of architects, engineers, scientists, and product experts on a mission\
    \ to revolutionize finance through world\u2011class research, solutions, and a\
    \ resilient data platform. With locations across Toronto, Waterloo, Montreal,\
    \ Calgary, and Vancouver, we\u2019re at the forefront of AI research and platform\
    \ development. With a focus on cutting\u2011edge research in areas like time series\
    \ forecasting, causal machine learning, and responsible AI, we are seamlessly\
    \ integrating AI research and data engineering, to solve critical challenges in\
    \ the financial industry. We are building intelligent, and scalable, data\u2011\
    driven solutions that will help communities thrive and drive innovation for our\
    \ customers across the bank.\n\n## Inclusion and Equal Opportunity Employment\n\
    \nRBC is an equal opportunity employer committed to diversity and inclusion. We\
    \ are pleased to consider all qualified applicants for employment without regard\
    \ to race, color, religion, sex, sexual orientation, gender identity, national\
    \ origin, age, disability, protected veterans status, Aboriginal/Native American\
    \ status or any other legally\u2011protected factors. Disability\u2011related\
    \ accommodations during the application process are available upon request.\n\n\
    ## Job Skills\n\nBig Data Analytics, Critical Thinking, Decision Making, Industry\
    \ Knowledge, Machine Learning (ML), Software Engineering, Software Product Design\
    \  \n\n## Additional Job Details\n\n**Address:** 401 GEORGIA ST W:VANCOUVER  \n\
    **City:** Vancouver  \n**Country:** Canada  \n**Work hours/week:** 37.5  \n**Employment\
    \ Type:** Full time  \n**Platform:** TECHNOLOGY AND OPERATIONS  \n**Job Type:**\
    \ Regular  \n**Pay Type:** Salaried  \n**Posted Date:** 2025-04-29  \n**Application\
    \ Deadline:** 2026-04-27  \n**Note:** Applications will be accepted until 11:59\u202F\
    PM on the day prior to the application deadline date above"
