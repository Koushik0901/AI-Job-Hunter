- id: 002-amii-(alberta-machine-intelligence-institute)-machine-learning-residen
  job_url: https://www.linkedin.com/jobs/view/4371317750/
  company: Amii (Alberta Machine Intelligence Institute)
  title: 'Machine Learning Resident - Client: ConeTec (1 year term)'
  job_description: "## Aboutthe job  \n\u201CJoin us in tackling one of the oil &\
    \ gas industry\u2019s most critical safety challenges: monitoring of tailing ponds.\
    \ We are looking for an ML researcher or engineer to build efficient, ML\u2011\
    based systems for identifying and flagging site composition risks. You\u2019ll\
    \ collaborate with domain experts, engineers and scientists to collect and curate\
    \ a novel site characterization dataset, utilizing tools spanning LLMs, OCR, and\
    \ other extraction techniques, to then explore Deep Learning and Transfer Learning\
    \ approaches to build predictive ML systems.\u201D  \n\n\u2014 Dave Staszak, Lead\
    \ Machine Learning Scientist, Advanced Technology  \n\n## About the Role  \nThis\
    \ is a paid residency that will be undertaken over a 12\u2011month period with\
    \ the potential to be hired by our client, ConeTec, afterwards (note: at the discretion\
    \ of the client). The Resident will report to an Amii Scientist and regularly\
    \ consult with the client team to share insights and engage in knowledge transfer\
    \ activities. Successful candidates will be members of a cross\u2011functional\
    \ project team with backgrounds in ML research, project management, software engineering,\
    \ and new product development. This is a rare opportunity to be mentored by world\u2011\
    class scientists and to develop something truly impactful.  \n\n## About the Client\
    \  \nConeTec is a leading provider of geocharacterization services worldwide,\
    \ specializing in subsurface investigation to help clients explore, build, and\
    \ protect the world with confidence. By reducing geological uncertainty, ConeTec\
    \ supports better decision\u2011making through the delivery of high\u2011quality,\
    \ reliable geotechnical information.  \n\nConeTec employs skilled professionals\
    \ and leverages innovative tools, technologies, and methods to safely acquire\
    \ high\u2011quality data for geotechnical, geoenvironmental, and mining applications.\
    \ ConeTec is committed to fostering an excellent work environment with strong\
    \ opportunities for professional development, while maintaining the safety of\
    \ all personnel as its highest priority.  \n\n## About the Project  \nThis project\
    \ focuses on developing modern machine\u2011learning solutions to improve geotechnical\
    \ site characterization. A core component involves building AI\u2011assisted tools\
    \ to automatically process large volumes of publicly available reports and convert\
    \ them into structured, high\u2011quality datasets by extracting key engineering\
    \ parameters and standardizing data formats for integration with ConeTec\u2019\
    s geospatial database.  \n\nIn addition, the project aims to advance ML\u2011\
    driven Cone Penetration Testing (CPT)\u2011based approaches for improving site\
    \ characterization. By leveraging historical datasets and ConeTec\u2019s extensive\
    \ in\u2011situ measurements, the work will support the development of predictive\
    \ models that enhance subsurface understanding.  \n\n## Required Skills / Expertise\
    \  \nAre you passionate about building great solutions? You\u2019ll be presented\
    \ with opportunities to both personally and professionally develop as you build\
    \ your career. We\u2019re looking for a talented and enthusiastic individual with\
    \ a solid background in machine learning, specifically with unstructured data\
    \ extraction methods (OCR\u2011, LLM\u2011based, etc.) experience and a solid\
    \ understanding of predictive ML techniques (including Deep Learning, classification/regression,\
    \ etc.).  \n\n## Key Responsibilities  \n- Design, implement, optimize, and evaluate\
    \ models to accurately extract and collate scientific data from public and private\
    \ sources.  \n- Prepare, curate, and preprocess unstructured data into high\u2011\
    quality datasets to then use for predictive model training, fine\u2011tuning,\
    \ and validating.  \n- Utilize state\u2011of\u2011the\u2011art LLM and ML frameworks,\
    \ tools and open\u2011source libraries to enhance model performance, accelerate\
    \ workflows, and optimize data processing.  \n- Conduct applied research on LLM\
    \ and ML techniques, with a focus to understanding and addressing the limitations\
    \ of existing models.  \n- Optimize ML pipelines to ensure efficiency, scalability,\
    \ and real\u2011time processing capabilities.  \n- Collaborate with the project\
    \ team and stakeholders to develop MVP and client\u2011focused solutions.  \n\
    - Engage in regular client meetings, contributing to presentations and reports\
    \ on project progress.  \n\n## Required Qualifications  \n- Completion of a Computer\
    \ Science (or a related scientific/engineering graduate degree program) MSc. or\
    \ PhD.  \n- Proficient in developing, training, fine\u2011tuning and evaluating\
    \ machine learning and deep neural network models in PyTorch and/or TensorFlow.\
    \  \n- Proficient in Python programming language and related LLM and ML frameworks,\
    \ libraries, and toolkits (e.g., Scikit\u2011learn, PyTorch, Pandas, HuggingFace,\
    \ LangGraph).  \n- Solid understanding of classical statistics and its application\
    \ in model validation.  \n- Familiarity with Linux, Git version control, and writing\
    \ clean code.  \n- A positive attitude towards learning and understanding a new\
    \ applied domain.  \n- Must be legally eligible to work in Canada.  \n\n## Preferred\
    \ Qualifications  \n- Familiarity with and hands\u2011on experience with both\
    \ unstructured and structured data.  \n- Publication record in peer\u2011reviewed\
    \ academic conferences or relevant journals in machine learning (specifically\
    \ LLM work or applied ML applications).  \n- Experience/familiarity with software\
    \ engineering best practices.  \n- Experience with deploying machine learning\
    \ models in production environments or strong software engineering (or MLE) skills\
    \ is a plus.  \n\n## Non\u2011Technical Requirements  \n- Desire to take ownership\
    \ of a problem and demonstrated leadership skills.  \n- Interdisciplinary team\
    \ player enthusiastic about working together to achieve excellence.  \n- Capable\
    \ of critical and independent thought.  \n- Able to communicate technical concepts\
    \ clearly and advise on the application of machine intelligence.  \n- Intellectual\
    \ curiosity and the desire to learn new things, techniques, and technologies.\
    \  \n\n## Why You Should Apply  \n\n### Besides Gaining Industry Experience, Additional\
    \ Perks Include  \n- Work under the mentorship of an Amii Scientist for the duration\
    \ of the project.  \n- Participate in professional development activities.  \n\
    - Gain access to the Amii community and events.  \n- Get paid for your work (a\
    \ fair and equitable rate of pay will be negotiated at the time of offer).  \n\
    - Build your professional network.  \n- The opportunity for an ongoing machine\
    \ learning role at the client\u2019s organization at the end of the term (at the\
    \ client\u2019s discretion).  \n\n## About Amii  \nOne of Canada\u2019s three\
    \ main institutes for artificial intelligence (AI) and machine learning, our world\u2011\
    renowned researchers drive fundamental and applied research at the University\
    \ of Alberta (and other academic institutions), training some of the world\u2019\
    s top scientific talent. Our cross\u2011functional teams work collaboratively\
    \ with Alberta\u2011based businesses and organizations to build AI capacity and\
    \ translate scientific advancement into industry adoption and economic impact.\
    \  \n\n## How to Apply  \nIf this sounds like the opportunity you've been waiting\
    \ for, please don\u2019t wait for the closing date of March\u202F4,\u202F2026\
    \ to apply. We\u2019re excited to add a new member to the Amii team for this role,\
    \ and the posting may come down sooner than the closing date if we find the right\
    \ candidate before the posting closes!  \n\nWhen sending your application, please\
    \ send your resume and cover letter indicating why you think you'd be a fit for\
    \ Amii and the role. In your cover letter, please include one professional accomplishment\
    \ you are most proud of and why.  \n\nApplicants must be legally eligible to work\
    \ in Canada at the time of application.  \n\nAmii is an equal opportunity employer\
    \ and values a diverse workforce. We encourage applications from all qualified\
    \ individuals without regard to ethnicity, religion, gender identity, sexual orientation,\
    \ age or disability. Accommodations for disability\u2011related needs throughout\
    \ the recruitment and selection process are available upon request. Any information\
    \ provided by you for accommodations will be kept confidential and won\u2019t\
    \ be used in the selection process.  \n\n## Eligibility  \nMust be legally eligible\
    \ to work in Canada."
